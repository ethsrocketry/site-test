<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Info Base · ETHS Rocketry</title>
  
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (() => {
      const THEME_KEY = 'etrb_theme';
      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      const theme = savedTheme || (prefersLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --accent: #4f9cf9; 
      --accent-dim: rgba(79, 156, 249, 0.18); 
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f; 
      --bg2: #0d0f1a; 
      --nav-bg: rgba(8,9,15,0.88);
      --surface: rgba(255,255,255,0.04); 
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08); 
      --text: #e8ecf8; 
      --text-muted: rgba(232,236,248,0.45); 
      --text-faint: rgba(232,236,248,0.22);
      --red: rgba(255, 90, 90, 0.85); 
      --mono: 'Space Mono', monospace; 
      --sans: 'Syne', sans-serif;
    }
    :root[data-theme="light"],
    body[data-theme="light"] {
      --bg: #f5f7fb;
      --bg2: #ffffff;
      --nav-bg: rgba(245,247,251,0.92);
      --surface: rgba(15,24,42,0.05);
      --surface-hover: rgba(15,24,42,0.09);
      --border: rgba(15,24,42,0.14);
      --text: #0f172a;
      --text-muted: rgba(15,23,42,0.72);
      --text-faint: rgba(15,23,42,0.5);
      --accent-dim: rgba(79,156,249,0.14);
      --accent-border: rgba(79,156,249,0.38);
      --red: #b91c1c;
    }

    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--sans); 
      line-height: 1.6; 
      min-height: 100vh; 
    }

    /* ── NAVIGATION ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; flex-shrink: 0; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }

    .nav-links a.join-us-link {
      background: linear-gradient(90deg, #4f9cf9, #3fd6a0, #f6c453, #ff7aa2, #4f9cf9);
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: joinUsGradientShift 6s linear infinite;
    }
    @keyframes joinUsGradientShift {
      from { background-position: 0% 50%; }
      to { background-position: 280% 50%; }
    }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    
    .member-entry { display: inline-flex; align-items: center; gap: 7px; }
    .lock-icon { width: 13px; height: 13px; display: inline-flex; color: var(--red); transition: color 0.3s; flex-shrink: 0; }
    .lock-icon svg { width: 13px; height: 13px; }
    .lock-icon.unlocked { color: #3fd6a0; }
    
    .member-pill { display: inline-flex; align-items: center; gap: 10px; border: 0.5px solid var(--accent-border); background: var(--accent-dim); border-radius: 999px; padding: 5px 14px; }
    .member-pill-label { font-family: var(--mono); font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.08em; }
    .member-pill a { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .member-pill a:hover, .member-pill a.active { color: var(--accent); }
    .member-pill-sep { width: 0.5px; height: 12px; background: var(--border); display: inline-block; }
    .member-only { display: none; }

    /* ── SEARCH BAR ── */
    .search-container { margin-top: 24px; max-width: 400px; }
    #info-search {
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }
    #info-search:focus {
      border-color: var(--accent-border);
      background: var(--surface-hover);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    /* ── LOGIN GATE ── */
    #login-gate { 
      position: relative;
      min-height: calc(100vh - 58px); 
      display: flex; align-items: center; justify-content: center; 
      padding: 40px 20px; background: var(--bg2); 
      overflow: hidden;
    }

    /* Starfield Effect */
    #login-gate::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        radial-gradient(1px 1px at 8%  15%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 22% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 38% 10%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 55% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 60%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 92% 15%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 60% 40%, rgba(255,255,255,0.75) 0%, transparent 100%),
        radial-gradient(1.2px 1.2px at 95% 80%, rgba(255,255,255,0.8) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 30%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 70%, rgba(255,255,255,0.7) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 20% 5%, rgba(255,255,255,0.8) 0%, transparent 100%);
      pointer-events: none;
    }

    .login-card { position: relative; z-index: 1; background: var(--bg); border: 0.5px solid var(--border); border-radius: 14px; padding: 40px; width: 100%; max-width: 380px; }
    .login-card h1 { font-size: 20px; margin-bottom: 6px; }
    .login-card p { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
    
    .field { margin-bottom: 16px; }
    .field label { display: block; font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); margin-bottom: 7px; }
    .field input { width: 100%; padding: 10px 14px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 13px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent-border); }

    .error-msg { font-family: var(--mono); font-size: 12px; color: var(--red); margin-bottom: 14px; display: none; padding: 8px 12px; background: rgba(255,90,90,0.08); border: 0.5px solid rgba(255,90,90,0.25); border-radius: 6px; }
    .error-msg.visible { display: block; }
    .login-btn { width: 100%; padding: 11px; background: var(--accent-dim); border: 0.5px solid var(--accent-border); border-radius: 6px; color: var(--accent); font-family: var(--mono); font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .login-btn:hover { background: rgba(79, 156, 249, 0.25); }

    /* ── MEMBER CONTENT ── */
    #member-content { display: none; }
    .page-header { padding: 52px 40px 32px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; }
    .page-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .page-eyebrow::before { content: '> '; opacity: 0.5; }
    .page-header h1 { font-size: 32px; font-weight: 700; color: var(--text); }
    .logout-btn { font-family: var(--mono); font-size: 12px; color: var(--text-faint); background: none; border: 0.5px solid var(--border); border-radius: 6px; padding: 8px 16px; cursor: pointer; transition: all 0.2s; }
    .logout-btn:hover { color: var(--text); border-color: var(--text-muted); }

    .section { padding: 40px; }
    .section h2 { font-size: 22px; margin-bottom: 24px; text-transform: lowercase; color: var(--text); }
    .doc-list { list-style: none; display: flex; flex-direction: column; gap: 12px; max-width: 760px; }
    .doc-link { 
      display: flex; justify-content: space-between; align-items: center; 
      background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; 
      padding: 18px 20px; color: var(--text); text-decoration: none; 
      transition: background 0.2s, border-color 0.2s; 
    }
    .doc-link:hover { background: var(--surface-hover); border-color: var(--accent-border); }
    .doc-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .doc-desc { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
    .doc-icon-wrap { display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); }
    .doc-icon { width: 20px; height: 20px; }
    .doc-icon-wrap.type-pdf,
    .doc-icon-wrap.type-video { color: #ff4d4f; }
    .doc-icon-wrap.type-pptx,
    .doc-icon-wrap.type-slides { color: #f2c94c; }
    .doc-icon-wrap.type-csv { color: #27ae60; }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .page-header { padding: 36px 20px 28px; flex-direction: column; align-items: flex-start; gap: 16px; }
      .section { padding: 28px 20px 36px; }
      .login-card { padding: 28px 24px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="home.html">
      <img src="etrb-logo.png" alt="ETHS Rocketry logo" />
      <span class="nav-brand">ETHS Rocketry</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">home</a></li>
      <li><a href="arc-2026.html">arc 2026</a></li>
      <li><a href="r4s.html">r4s</a></li>
      <li><a href="history.html">history</a></li>
      <li><a href="people.html">people</a></li>
      <li><a href="releases.html">releases</a></li>
      <li><a href="join-us.html" class="join-us-link">join us</a></li>
      <li>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme" aria-pressed="false">
          <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle-label">dark</span>
        </button>
      </li>
      <li class="member-pill" id="member-pages-pill">
        <a href="member-tools.html" class="member-entry">
          <span>member tools</span>
          <span class="lock-icon" id="member-lock-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 9V6.8a3 3 0 1 1 6 0V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
        </a>
        <span class="member-pill-sep member-only"></span>
        <a href="info-base.html" class="member-only active">info base</a>
        <span class="member-pill-sep member-only"></span>
        <a href="arc-org.html" class="member-only">arc org</a>
        <span class="member-pill-sep member-only"></span>
        <a href="r4s-org.html" class="member-only">r4s org</a>
      </li>
    </ul>
  </nav>

  <div id="login-gate">
    <div class="login-card">
      <h1>Member access</h1>
      <p>Sign in to access the info base.</p>
      <div class="field"><label>Username</label><input type="text" id="username" placeholder="username" /></div>
      <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" /></div>
      <div class="error-msg" id="error-msg">Incorrect username or password.</div>
      <button class="login-btn" onclick="tryLogin()">Sign in →</button>
    </div>
  </div>

  <div id="member-content">
    <div class="page-header">
      <div>
        <div class="page-eyebrow">Members only</div>
        <h1>Info base</h1>
        <div class="search-container">
          <input type="text" id="info-search" placeholder="Search entries..." onkeyup="filterEntries()">
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>

    <div id="dynamic-content"></div>
  </div>

  <script>
    const SESSION_KEY = 'etrb_auth';
    const CORRECT_USER = 'member';
    const CORRECT_PASS = 'rktpass1';

    // --- NAV STATE ---
    function setMemberNavState(isLoggedIn) {
      const icon = document.getElementById('member-lock-icon');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
      document.querySelectorAll('.member-only').forEach(el => {
        el.style.display = isLoggedIn ? 'inline-flex' : 'none';
      });
    }

    // --- SEARCH FILTER ---
    function filterEntries() {
      const query = document.getElementById('info-search').value.toLowerCase();
      const entries = document.querySelectorAll('.doc-list li');
      const sections = document.querySelectorAll('.section');

      entries.forEach(entry => {
        const title = entry.querySelector('.doc-title').textContent.toLowerCase();
        const desc = entry.querySelector('.doc-desc').textContent.toLowerCase();
        
        if (title.includes(query) || desc.includes(query)) {
          entry.style.display = "";
        } else {
          entry.style.display = "none";
        }
      });

      sections.forEach(section => {
        const visibleItems = section.querySelectorAll('li:not([style*="display: none"])');
        section.style.display = visibleItems.length === 0 && query !== "" ? "none" : "";
      });
    }

    // --- PARSER ENGINE ---
    async function loadInfoBase() {
      const container = document.getElementById('dynamic-content');
      try {
        const response = await fetch('info-base_data.md');
        if (!response.ok) throw new Error('File not found');
        const text = await response.text();
        const lines = text.split('\n');
        
        let html = '';
        let listOpen = false;

        lines.forEach(line => {
          line = line.trim();
          if (!line || line.startsWith('//')) return;

          const headingMatch = line.match(/^heading\((.*)\)$/);
          const linkMatch = line.match(/^link\((.*),\s*(.*),\s*(.*),\s*(.*)\)$/);

          if (headingMatch) {
            if (listOpen) { html += '</ul></section>'; }
            html += `<section class="section"><h2>${headingMatch[1]}</h2><ul class="doc-list">`;
            listOpen = true;
          } 
          else if (linkMatch) {
            const [_, title, desc, type, url] = linkMatch;
            const normalizedType = type.trim().toUpperCase();
            const iconByType = {
              DOC: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 7H13M7 10H13M7 13H11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`,
              PDF: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><text x="10" y="12" text-anchor="middle" font-size="4.2" font-family="Inter, sans-serif" font-weight="700" fill="currentColor">PDF</text></svg>`,
              CSV: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8H13M7 10.5H13M7 13H13M9.2 7.2V14.8M11.8 7.2V14.8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>`,
              TXT: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 8H13M7 10.5H13M7 13H12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>`,
              PPTX: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="3" width="12" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7.2 12V8H8.6C9.3 8 9.8 8.4 9.8 9.1C9.8 9.8 9.3 10.2 8.6 10.2H7.2M10.7 12L12 10L13.3 12M11.2 11.2H12.8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
              VIDEO: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="4" y="5" width="9.5" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 8L10.8 10L8 12V8Z" fill="currentColor"/><path d="M13.5 8.3L16 7V13L13.5 11.7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
              IMAGE: `<svg class="doc-icon" viewBox="0 0 20 20" fill="none"><rect x="3.8" y="4" width="12.4" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><path d="M5.5 14L9.2 10.3C9.6 9.9 10.2 9.9 10.6 10.3L12 11.7L13.1 10.6C13.5 10.2 14.1 10.2 14.5 10.6L16 12.1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
            };
            const imageTypes = ['IMG', 'JPG', 'JPEG', 'PNG', 'GIF', 'WEBP', 'SVG'];
            const presentationTypes = ['SLIDES', 'PPT'];
            const effectiveType = imageTypes.includes(normalizedType)
              ? 'IMAGE'
              : (presentationTypes.includes(normalizedType) ? 'PPTX' : normalizedType);
            const iconSVG = iconByType[effectiveType] || iconByType.DOC;
            const iconTypeClass = `type-${effectiveType.toLowerCase()}`;

            html += `
              <li>
                <a class="doc-link" href="${url.trim()}" target="_blank" rel="noopener noreferrer">
                  <div>
                    <div class="doc-title">${title.trim()}</div>
                    <div class="doc-desc">${desc.trim()}</div>
                  </div>
                  <span class="doc-icon-wrap ${iconTypeClass}">${iconSVG}</span>
                </a>
              </li>`;
          }
        });

        if (listOpen) html += '</ul></section>';
        container.innerHTML = html;

      } catch (err) {
        container.innerHTML = `<div class="section"><p style="color:var(--red); font-family:var(--mono); font-size:13px;">[ERROR] Failed to load info-base_data.md archive.</p></div>`;
      }
    }

    // --- AUTH LOGIC ---
    function tryLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const err  = document.getElementById('error-msg');
      if (user === CORRECT_USER && pass === CORRECT_PASS) {
        sessionStorage.setItem(SESSION_KEY, '1');
        err.classList.remove('visible');
        showContent();
      } else {
        err.classList.add('visible');
        document.getElementById('password').value = '';
      }
    }

    function logout() {
      sessionStorage.removeItem(SESSION_KEY);
      location.reload();
    }

    function showContent() {
      document.getElementById('login-gate').style.display = 'none';
      document.getElementById('member-content').style.display = 'block';
      setMemberNavState(true);
      loadInfoBase();
    }

    if (sessionStorage.getItem(SESSION_KEY) === '1') showContent();
    else setMemberNavState(false);

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && document.getElementById('login-gate').style.display !== 'none') tryLogin();
    });
  </script>

  <script>
    (() => {
      const THEME_KEY = 'etrb_theme';
      const toggleBtn = document.getElementById('theme-toggle');
      if (!toggleBtn) return;
      const icon = toggleBtn.querySelector('.theme-toggle-icon');
      const label = toggleBtn.querySelector('.theme-toggle-label');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
                toggleBtn.setAttribute('aria-pressed', theme === 'light' ? 'true' : 'false');
        if (icon) icon.textContent = theme === 'light' ? '☀️' : '🌙';
        if (label) label.textContent = theme;
      }

      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      applyTheme(savedTheme || (prefersLight ? 'light' : 'dark'));

      toggleBtn.addEventListener('click', () => {
        const nextTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      });
    })();
  </script>
</body>
</html>
