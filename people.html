<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>People · ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (() => {
      const THEME_KEY = 'etrb_theme';
      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      const theme = savedTheme || (prefersLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4f9cf9;
      --accent-dim: rgba(79, 156, 249, 0.18);
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f;
      --bg2: #0d0f1a;
      --nav-bg: rgba(8,9,15,0.88);
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e8ecf8;
      --text-muted: rgba(232,236,248,0.45);
      --text-faint: rgba(232,236,248,0.22);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    :root[data-theme="light"],
    body[data-theme="light"] {
      --bg: #f5f7fb;
      --bg2: #ffffff;
      --nav-bg: rgba(245,247,251,0.92);
      --surface: rgba(15,24,42,0.05);
      --surface-hover: rgba(15,24,42,0.09);
      --border: rgba(15,24,42,0.14);
      --text: #0f172a;
      --text-muted: rgba(15,23,42,0.72);
      --text-faint: rgba(15,23,42,0.5);
      --accent-dim: rgba(79,156,249,0.14);
      --accent-border: rgba(79,156,249,0.38);
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }

    .member-entry { display: inline-flex; align-items: center; gap: 7px; }
    .lock-icon { width: 13px; height: 13px; display: inline-flex; color: rgba(255,90,90,0.85); transition: color 0.3s; flex-shrink: 0; }
    .lock-icon svg { width: 13px; height: 13px; }
    .lock-icon.unlocked { color: #3fd6a0; }
    .member-pill { display: inline-flex; align-items: center; gap: 10px; border: 0.5px solid var(--accent-border); background: var(--accent-dim); border-radius: 999px; padding: 5px 14px; }
    .member-pill a { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .member-pill a:hover, .member-pill a.active { color: var(--accent); }
    .member-pill-sep { width: 0.5px; height: 12px; background: var(--border); display: inline-block; }
    .member-only { display: none; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .nav-links a.join-us-link {
      background: linear-gradient(90deg, #4f9cf9, #3fd6a0, #f6c453, #ff7aa2, #4f9cf9);
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: joinUsGradientShift 6s linear infinite;
    }
    @keyframes joinUsGradientShift {
      from { background-position: 0% 50%; }
      to { background-position: 280% 50%; }
    }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.2s, background 0.2s, border-color 0.2s;
    }
    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    .page-header {
      padding: 50px 40px 24px;
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
    }
    .page-header h1 { font-size: 34px; margin-bottom: 10px; }
    .page-header p { font-family: var(--mono); color: var(--text-muted); font-size: 13px; }
    .search-container { margin-top: 18px; max-width: 400px; }
    #people-search {
      width: 100%;
      padding: 10px 16px;
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: all 0.2s;
    }
    #people-search:focus {
      border-color: var(--accent-border);
      background: var(--surface-hover);
      box-shadow: 0 0 12px var(--accent-dim);
    }

    .people-wrap { padding: 36px 40px 56px; display: flex; flex-direction: column; gap: 34px; }
    .people-section h2 {
      font-size: 22px;
      margin-bottom: 16px;
      text-transform: lowercase;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    .section-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      border: 0.5px solid var(--border);
      background: var(--surface);
      border-radius: 999px;
      padding: 3px 10px;
      text-transform: none;
    }
    .people-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      max-width: 1100px;
    }
    .person-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, background 0.2s;
    }
    .person-card:hover {
      border-color: var(--accent-border);
      background: var(--surface-hover);
    }
    .person-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      background: var(--bg2);
    }
    .person-name {
      font-size: 18px;
      line-height: 1.3;
    }
    .person-bio {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
      min-height: 56px;
    }
    .person-contacts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 30px;
      align-items: center;
    }
    .contact-link {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 0.5px solid var(--border);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      background: var(--bg2);
      transition: color 0.2s, border-color 0.2s;
    }
    .contact-link svg { width: 16px; height: 16px; }
    .contact-link:hover {
      color: var(--accent);
      border-color: var(--accent-border);
    }
    .no-results {
      font-family: var(--mono);
      color: var(--text-muted);
      font-size: 13px;
    }

    @media (max-width: 700px) {
      nav { padding: 0 20px; }
      .page-header, .people-wrap { padding-left: 20px; padding-right: 20px; }
      .nav-links { gap: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="home.html">
      <img src="etrb-logo.png" alt="ETHS Rocketry logo" />
      <span class="nav-brand">ETHS Rocketry</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">home</a></li>
      <li><a href="arc-2026.html">arc 2026</a></li>
      <li><a href="r4s.html">r4s</a></li>
      <li><a href="history.html">history</a></li>
      <li><a href="people.html" class="active">people</a></li>
      <li><a href="releases.html">releases</a></li>
      <li><a href="join-us.html" class="join-us-link">join us</a></li>
      <li>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle light and dark theme" aria-pressed="false">
          <span class="theme-toggle-icon" aria-hidden="true">🌙</span>
          <span class="theme-toggle-label">dark</span>
        </button>
      </li>
      <li class="member-pill" id="member-pages-pill">
        <a href="member-tools.html" class="member-entry">
          <span>member tools</span>
          <span class="lock-icon" id="member-lock-icon"><svg viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 9V6.8a3 3 0 1 1 6 0V9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
        </a>
        <span class="member-pill-sep member-only"></span>
        <a href="info-base.html" class="member-only">info base</a>
        <span class="member-pill-sep member-only"></span>
        <a href="arc-org.html" class="member-only">arc org</a>
        <span class="member-pill-sep member-only"></span>
        <a href="r4s-org.html" class="member-only">r4s org</a>
      </li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>People</h1>
    <p>Current members and alumni.</p>
    <div class="search-container">
      <input type="text" id="people-search" placeholder="Search entries..." aria-label="Search people entries">
    </div>
  </header>

  <main class="people-wrap" id="people-content">Loading people data…</main>

  <script>
    function escapeHtml(text) {
      return text
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function splitArgs(raw) {
      const args = [];
      let current = '';
      let inQuote = false;
      for (const ch of raw) {
        if (ch === '"') {
          inQuote = !inQuote;
          continue;
        }
        if (ch === ',' && !inQuote) {
          args.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
      if (current) args.push(current.trim());
      return args;
    }

    function iconFor(method) {
      const m = method.toLowerCase();
      if (m === 'linkedin') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 8.5H3.56V20h3.38V8.5Zm.22-3.54A1.96 1.96 0 1 0 3.24 5a1.96 1.96 0 0 0 3.92-.04ZM20.76 13.44c0-3.46-1.85-5.07-4.32-5.07a3.74 3.74 0 0 0-3.35 1.84V8.5H9.72V20h3.37v-6.05c0-1.6.3-3.15 2.28-3.15 1.95 0 1.98 1.82 1.98 3.25V20h3.41v-6.56Z"/></svg>';
      if (m === 'github') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.58 2 12.22c0 4.5 2.87 8.32 6.84 9.66.5.1.68-.22.68-.49 0-.24-.01-1.03-.01-1.86-2.78.62-3.36-1.21-3.36-1.21-.46-1.19-1.11-1.5-1.11-1.5-.9-.63.07-.62.07-.62 1 .07 1.52 1.04 1.52 1.04.89 1.56 2.32 1.11 2.88.85.09-.66.35-1.11.64-1.36-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.73 0 0 .84-.28 2.75 1.05A9.27 9.27 0 0 1 12 7.1a9.3 9.3 0 0 1 2.5.35c1.9-1.33 2.74-1.05 2.74-1.05.56 1.42.2 2.47.11 2.73.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.6.69.49A10.23 10.23 0 0 0 22 12.22C22 6.58 17.52 2 12 2Z"/></svg>';
      if (m === 'email') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm9 7 8-5H4l8 5Zm0 2-8-5v8h16V9l-8 5Z"/></svg>';
      if (m === 'instagram') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3H7Zm11.5 1.5a1 1 0 1 1-1 1 1 1 0 0 1 1-1ZM12 7a5 5 0 1 1-5 5 5 5 0 0 1 5-5Zm0 2a3 3 0 1 0 3 3 3 3 0 0 0-3-3Z"/></svg>';
      return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 3h7v7h-2V6.41l-8.29 8.3-1.42-1.42 8.3-8.29H14V3ZM5 5h6v2H7v10h10v-4h2v6H5V5Z"/></svg>';
    }

    function parsePeople(md) {
      const lines = md.split('\n');
      const sections = [];
      let currentSection = null;
      let currentPerson = null;

      function pushPerson() {
        if (!currentSection || !currentPerson) return;
        currentSection.people.push(currentPerson);
        currentPerson = null;
      }

      for (const lineRaw of lines) {
        const line = lineRaw.trim();
        if (!line || line.startsWith('//')) continue;

        if (line.startsWith('section(') && line.endsWith(')')) {
          pushPerson();
          const title = line.slice(8, -1).trim();
          currentSection = { title, people: [] };
          sections.push(currentSection);
          continue;
        }

        if (line.startsWith('person(') && line.endsWith(')')) {
          pushPerson();
          if (!currentSection) continue;
          const args = splitArgs(line.slice(7, -1));
          currentPerson = {
            name: args[0] || 'Unnamed person',
            image: args[1] || 'people-media/wip-square.svg',
            bio: args[2] || 'Bio coming soon.',
            contacts: []
          };
          continue;
        }

        if (line.startsWith('contact(') && line.endsWith(')') && currentPerson) {
          const args = splitArgs(line.slice(8, -1));
          if (args[0] && args[1]) {
            currentPerson.contacts.push({ method: args[0], url: args[1] });
          }
          continue;
        }

        if (line === 'endperson') {
          pushPerson();
        }
      }
      pushPerson();
      return sections;
    }

    function sectionCountLabel(title, count) {
      const t = title.toLowerCase();
      if (t.includes('alumni')) return `${count} alumni`;
      if (t.includes('member')) return `${count} members`;
      return `${count} entries`;
    }

    function renderPeopleSections(sections) {
      if (!sections.length) return '<p class="no-results">No people data found.</p>';

      return sections.map((section) => {
        const peopleHtml = section.people.map((person) => {
          const contacts = person.contacts.length
            ? person.contacts.map((contact) => `<a class="contact-link" href="${escapeHtml(contact.url)}" target="_blank" rel="noopener noreferrer" aria-label="${escapeHtml(contact.method)}">${iconFor(contact.method)}</a>`).join('')
            : '<span style="font-family: var(--mono); font-size: 11px; color: var(--text-faint);">contact info coming soon</span>';
          return `<article class="person-card">
            <img class="person-photo" src="${escapeHtml(person.image)}" alt="Photo of ${escapeHtml(person.name)}" />
            <h3 class="person-name">${escapeHtml(person.name)}</h3>
            <p class="person-bio">${escapeHtml(person.bio)}</p>
            <div class="person-contacts">${contacts}</div>
          </article>`;
        }).join('');

        return `<section class="people-section">
          <h2>${escapeHtml(section.title)} <span class="section-count">${sectionCountLabel(section.title, section.totalCount)}</span></h2>
          <div class="people-grid">${peopleHtml}</div>
        </section>`;
      }).join('');
    }

    let allSections = [];

    function filterPeople() {
      const query = (document.getElementById('people-search')?.value || '').trim().toLowerCase();
      const filteredSections = allSections
        .map((section) => {
          const filteredPeople = query
            ? section.people.filter((person) => {
                const searchBlob = `${section.title} ${person.name} ${person.bio}`.toLowerCase();
                return searchBlob.includes(query);
              })
            : section.people;
          return {
            title: section.title,
            people: filteredPeople,
            totalCount: section.people.length
          };
        })
        .filter((section) => section.people.length > 0);

      document.getElementById('people-content').innerHTML = filteredSections.length
        ? renderPeopleSections(filteredSections)
        : '<p class="no-results">No matching people entries found.</p>';
    }

    fetch('people_data.md')
      .then((res) => res.text())
      .then((md) => {
        allSections = parsePeople(md);
        filterPeople();
      })
      .catch(() => {
        document.getElementById('people-content').innerHTML = '<p class="no-results">Could not load people data.</p>';
      });

    document.getElementById('people-search')?.addEventListener('input', filterPeople);
  </script>

  <script>
    const SESSION_KEY = 'etrb_auth';
    (function setMemberNavState() {
      const isLoggedIn = sessionStorage.getItem(SESSION_KEY) === '1';
      const icon = document.getElementById('member-lock-icon');
      if (icon) icon.classList.toggle('unlocked', isLoggedIn);
      document.querySelectorAll('.member-only').forEach(el => {
        el.style.display = isLoggedIn ? 'inline-flex' : 'none';
      });
    })();
  </script>

  <script>
    (() => {
      const THEME_KEY = 'etrb_theme';
      const toggleBtn = document.getElementById('theme-toggle');
      if (!toggleBtn) return;
      const icon = toggleBtn.querySelector('.theme-toggle-icon');
      const label = toggleBtn.querySelector('.theme-toggle-label');

      function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        toggleBtn.setAttribute('aria-pressed', theme === 'light' ? 'true' : 'false');
        if (icon) icon.textContent = theme === 'light' ? '☀️' : '🌙';
        if (label) label.textContent = theme;
      }

      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      applyTheme(savedTheme || (prefersLight ? 'light' : 'dark'));

      toggleBtn.addEventListener('click', () => {
        const nextTheme = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        localStorage.setItem(THEME_KEY, nextTheme);
        applyTheme(nextTheme);
      });
    })();
  </script>
</body>
