<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Releases · ETHS Rocketry</title>
  <link rel="icon" type="image/png" href="etrb-logo.png">
  <link rel="apple-touch-icon" href="etrb-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (() => {
      const THEME_KEY = 'etrb_theme';
      const savedTheme = localStorage.getItem(THEME_KEY);
      const prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
      const theme = savedTheme || (prefersLight ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #4f9cf9;
      --accent-dim: rgba(79, 156, 249, 0.18);
      --accent-border: rgba(79, 156, 249, 0.35);
      --bg: #08090f;
      --bg2: #0d0f1a;
      --nav-bg: rgba(8,9,15,0.88);
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #e8ecf8;
      --text-muted: rgba(232,236,248,0.45);
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    :root[data-theme="light"],
    body[data-theme="light"] {
      --bg: #f5f7fb;
      --bg2: #ffffff;
      --nav-bg: rgba(245,247,251,0.92);
      --surface: rgba(15,24,42,0.05);
      --surface-hover: rgba(15,24,42,0.09);
      --border: rgba(15,24,42,0.14);
      --text: #0f172a;
      --text-muted: rgba(15,23,42,0.72);
      --accent-dim: rgba(79,156,249,0.14);
      --accent-border: rgba(79,156,249,0.38);
    }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 58px;
      background: var(--nav-bg);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }

    .member-pill { display: inline-flex; align-items: center; gap: 10px; border: 0.5px solid var(--accent-border); background: var(--accent-dim); border-radius: 999px; padding: 5px 14px; }
    .member-pill a { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .member-pill a:hover, .member-pill a.active { color: var(--accent); }
    .member-pill-sep { width: 0.5px; height: 12px; background: var(--border); display: inline-block; }
    .member-only { display: none; }
    .nav-links a { font-size: 13px; color: var(--text-muted); text-decoration: none; font-family: var(--mono); }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); }
    .nav-links a.join-us-link {
      background: linear-gradient(90deg, #4f9cf9, #3fd6a0, #f6c453, #ff7aa2, #4f9cf9);
      background-size: 280% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: joinUsGradientShift 6s linear infinite;
    }
    @keyframes joinUsGradientShift {
      from { background-position: 0% 50%; }
      to { background-position: 280% 50%; }
    }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 6px 10px;
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
    }

    .page-header {
      padding: 50px 40px 24px;
      background: var(--bg2);
      border-bottom: 0.5px solid var(--border);
    }
    .page-header h1 { font-size: 34px; margin-bottom: 10px; }
    .page-header p { font-family: var(--mono); color: var(--text-muted); font-size: 13px; }

    .release-wrap {
      padding: 36px 40px 56px;
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }
    .release-list,
    .release-viewer {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 18px;
    }
    .release-list h2,
    .release-viewer h2 {
      font-size: 20px;
      margin-bottom: 14px;
    }
    .release-buttons { display: flex; flex-direction: column; gap: 10px; }
    .release-button {
      width: 100%;
      text-align: left;
      border: 0.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg2);
      color: var(--text);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .release-button:hover,
    .release-button.active {
      background: var(--surface-hover);
      border-color: var(--accent-border);
    }
    .release-title { font-size: 14px; font-weight: 600; margin-bottom: 5px; }
    .release-meta { font-family: var(--mono); font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .release-tabbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .release-tab {
      border: 0.5px solid var(--border);
      background: var(--bg2);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
    }
    .release-tab.active {
      color: var(--accent);
      border-color: var(--accent-border);
      background: var(--accent-dim);
    }

    .release-panel {
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 500px;
      background: var(--bg2);
      display: flex;
      flex-direction: column;
    }
    .release-panel h3 { font-size: 22px; margin-bottom: 6px; }
    .release-date { font-family: var(--mono); font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
    
    .release-body { flex-grow: 1; }
    .release-body p, .release-body li {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    
    /* Embed Styles */
    .embed-container { width: 100%; min-height: 500px; flex-grow: 1; border-radius: 8px; overflow: hidden; border: 0.5px solid var(--border); background: #000; }
    .embed-container iframe, .embed-container video { width: 100%; height: 100%; border: none; display: block; }
    .embed-img { max-width: 100%; border-radius: 8px; display: block; margin: 0 auto; border: 0.5px solid var(--border); }

    .empty-state { color: var(--text-muted); font-family: var(--mono); font-size: 12px; }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .page-header, .release-wrap { padding-left: 20px; padding-right: 20px; }
      .release-wrap { grid-template-columns: 1fr; }
      .nav-links { gap: 16px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="home.html">
      <img src="etrb-logo.png" alt="ETHS Rocketry logo" />
      <span class="nav-brand">ETHS Rocketry</span>
    </a>
    <ul class="nav-links">
      <li><a href="home.html">home</a></li>
      <li><a href="arc-2026.html">arc 2026</a></li>
      <li><a href="r4s.html">r4s</a></li>
      <li><a href="history.html">history</a></li>
      <li><a href="people.html">people</a></li>
      <li><a href="releases.html" class="active">releases</a></li>
      <li><a href="join-us.html" class="join-us-link">join us</a></li>
      <li>
        <button class="theme-toggle" id="theme-toggle" type="button">
          <span class="theme-toggle-icon">🌙</span>
          <span class="theme-toggle-label">dark</span>
        </button>
      </li>
      <li class="member-pill" id="member-pages-pill">
        <a href="member-tools.html">member tools</a>
        <span class="member-pill-sep member-only"></span>
        <a href="info-base.html" class="member-only">info base</a>
      </li>
    </ul>
  </nav>

  <header class="page-header">
    <h1>Releases</h1>
    <p>Public changelog and resources. View release notes or embedded media below.</p>
  </header>

  <main class="release-wrap">
    <section class="release-list">
      <h2>Release Feed</h2>
      <div class="release-buttons" id="release-buttons">Loading releases…</div>
    </section>

    <section class="release-viewer">
      <h2>Viewer</h2>
      <div class="release-tabbar" id="release-tabbar"></div>
      <div class="release-panel" id="release-panel">
        <p class="empty-state">Select a release to view.</p>
      </div>
    </section>
  </main>

  <script>
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function renderMarkdown(md) {
      const lines = md.split('\n');
      const out = [];
      let inList = false;
      for (const line of lines) {
        if (line.startsWith('- ')) {
          if (!inList) { out.push('<ul>'); inList = true; }
          out.push(`<li>${escapeHtml(line.slice(2))}</li>`);
          continue;
        }
        if (line.trim() === '') {
          if (inList) { out.push('</ul>'); inList = false; }
          continue;
        }
        if (inList) { out.push('</ul>'); inList = false; }
        out.push(`<p>${escapeHtml(line)}</p>`);
      }
      if (inList) out.push('</ul>');
      return out.join('');
    }

    function parseReleases(md) {
      const sections = md.split(/\n##\s+/).map((chunk, i) => i === 0 ? chunk.replace(/^##\s+/, '') : chunk);
      const releases = [];
      sections.forEach((section) => {
        const trimmed = section.trim();
        if (!trimmed) return;
        const lines = trimmed.split('\n');
        const title = lines.shift().trim();
        const meta = {};
        const bodyLines = [];
        let inBody = false;
        lines.forEach((line) => {
          if (!inBody && line.startsWith('- ')) {
            const sep = line.indexOf(':');
            if (sep > -1) {
              meta[line.slice(2, sep).trim().toLowerCase()] = line.slice(sep + 1).trim();
              return;
            }
          }
          if (line.trim() === '---') { inBody = true; return; }
          if (inBody) bodyLines.push(line);
        });
        releases.push({
          title,
          date: meta.date || 'undated',
          summary: meta.summary || '',
          mode: (meta.mode || 'tab').toLowerCase(),
          url: meta.url || '',
          body: bodyLines.join('\n').trim()
        });
      });
      return releases;
    }

    const openTabs = [];
    let activeTabIndex = -1;

    function renderTabPanel() {
      const tabbar = document.getElementById('release-tabbar');
      const panel = document.getElementById('release-panel');
      if (openTabs.length === 0) {
        tabbar.innerHTML = '';
        panel.innerHTML = '<p class="empty-state">Select a release from the feed.</p>';
        return;
      }
      tabbar.innerHTML = openTabs.map((tab, idx) => `
        <button class="release-tab ${idx === activeTabIndex ? 'active' : ''}" data-tab-index="${idx}">${escapeHtml(tab.title)}</button>
      `).join('');

      const release = openTabs[activeTabIndex];
      let mediaContent = '';

      if (release.mode === 'embed' && release.url) {
        const url = release.url.toLowerCase();
        const isPdf = url.endsWith('.pdf');
        const isVideo = url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.mov');
        const isImage = url.endsWith('.jpg') || url.endsWith('.jpeg') || url.endsWith('.png') || url.endsWith('.gif') || url.endsWith('.webp');

        if (isVideo) {
          mediaContent = `<div class="embed-container"><video controls><source src="${release.url}" type="video/mp4">Your browser does not support the video tag.</video></div>`;
        } else if (isPdf) {
          mediaContent = `<div class="embed-container"><iframe src="${release.url}"></iframe></div>`;
        } else if (isImage) {
          mediaContent = `<img src="${release.url}" class="embed-img" alt="${escapeHtml(release.title)}">`;
        } else {
          mediaContent = `<div class="embed-container"><iframe src="${release.url}"></iframe></div>`;
        }
      }

      panel.innerHTML = `
        <h3>${escapeHtml(release.title)}</h3>
        <p class="release-date">${escapeHtml(release.date)}</p>
        ${mediaContent}
        <div class="release-body" style="margin-top: 20px;">${renderMarkdown(release.body || '')}</div>
      `;

      tabbar.querySelectorAll('[data-tab-index]').forEach(btn => {
        btn.onclick = () => { activeTabIndex = Number(btn.dataset.tabIndex); renderTabPanel(); };
      });
    }

    async function loadReleases() {
      const buttonWrap = document.getElementById('release-buttons');
      try {
        const response = await fetch('releases_data.md');
        const raw = await response.text();
        const releases = parseReleases(raw);
        buttonWrap.innerHTML = '';
        releases.forEach((release) => {
          const btn = document.createElement('button');
          btn.className = 'release-button';
          btn.innerHTML = `<div class="release-title">${escapeHtml(release.title)}</div><div class="release-meta">${escapeHtml(release.date)}</div>`;
          btn.onclick = () => {
            if (release.mode === 'link') { window.open(release.url, '_blank'); return; }
            const idx = openTabs.findIndex(t => t.title === release.title);
            if (idx === -1) { openTabs.push(release); activeTabIndex = openTabs.length - 1; }
            else { activeTabIndex = idx; }
            renderTabPanel();
          };
          buttonWrap.appendChild(btn);
        });
      } catch (err) { buttonWrap.innerHTML = '<p class="empty-state">Error loading releases.</p>'; }
    }
    loadReleases();
  </script>
</body>
</html>
